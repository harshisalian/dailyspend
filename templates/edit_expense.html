{% extends "base.html" %}

{% block title %}Edit Expense - Daily Spend{% endblock %}

{% block content %}
<div class="expenses-container">
  <div class="expenses-header">
    <h1>Edit Expense</h1>
    <p>Update the details of your expense</p>
  </div>

  <form method="POST" action="{{ url_for('expenses.edit_expense', expense_id=expense.id) }}" class="expense-form">
    <!-- Title Field -->
    <div class="form-group">
      <label for="title" class="form-label">Expense Title *</label>
      <input type="text" id="title" name="title" class="form-input" value="{{ expense.title }}" required minlength="3"
        maxlength="100" autofocus />
    </div>

    <!-- Amount Field -->
    <div class="form-group">
      <label for="amount" class="form-label">Amount *</label>
      <input type="number" id="amount" name="amount" class="form-input" value="{{ expense.amount }}" step="0.01"
        min="0.01" required />
    </div>

    <!-- Category Field -->
    <div class="form-group">
      <label for="category" class="form-label">Category *</label>
      <select id="category" name="category" class="form-input" required>
        {% for cat in categories %}
        <option value="{{ cat }}" {% if cat==expense.category %}selected{% endif %}>
          {{ cat }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- Date Field -->
    <div class="form-group">
      <label for="date" class="form-label">Date *</label>
      <input type="date" id="date" name="date" class="form-input" value="{{ expense.date }}" required />
    </div>

    <!-- Description Field -->
    <div class="form-group">
      <label for="description" class="form-label">Description</label>
      <textarea id="description" name="description" class="form-input" rows="4"
        maxlength="500">{{ expense.description or '' }}</textarea>
      <small class="form-help">Up to 500 characters</small>
    </div>

    <!-- Buttons -->
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        💾 Update Expense
      </button>
      <a href="{{ url_for('expenses.view_expenses') }}" class="btn btn-secondary">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
